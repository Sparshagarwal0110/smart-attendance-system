<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:20px; margin:30px 0; }
        .stat-card { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; padding:20px; border-radius:12px; text-align:center; }
        .stat-card .number { font-size:36px; font-weight:bold; margin:10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><div class="logo">👑</div><div class="logo-text">Hospital Admin</div></div>
        <div class="content">
            <h1>Welcome, {{ username }}!</h1>
            <div class="stats-grid">
                <div class="stat-card"><h3>Total Employees</h3><div class="number">{{ total_employees }}</div></div>
                <div class="stat-card"><h3>Present Today</h3><div class="number">{{ present_today }}</div></div>
                <div class="stat-card"><h3>Attendance %</h3><div class="number">{{ attendance_percent }}%</div></div>
            </div>
            <div class="menu">
                <a href="{{ url_for('admin_users') }}">Manage Users & Employees</a>
                <a href="{{ url_for('admin_departments') }}">Manage Departments & HODs</a>
                <a href="{{ url_for('admin_attendance') }}">View Attendance</a>
                <a href="{{ url_for('admin_stats') }}">Statistics & Charts</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            </div>
        </div>
    </div>
</body>
</html>
