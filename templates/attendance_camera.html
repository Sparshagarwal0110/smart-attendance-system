<!DOCTYPE html>
<html>
<head>
    <title>Face Recognition Attendance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📷</div>
            <div class="logo-text">Live Attendance</div>
        </div>
        <div class="content">
            <h2>Select Subject & Mark Attendance</h2>
            <select id="subjectSelect">
                <option value="">-- Select Subject --</option>
                {% for subj in subjects %}
                <option value="{{ subj.id }}">{{ subj.subject_code }} - {{ subj.subject_name }}</option>
                {% endfor %}
            </select>
            <video id="video" width="640" height="480" autoplay></video>
            <br>
            <button id="captureBtn">Mark Attendance (5-frame burst)</button>
            <div id="result" class="result-box">Ready – select subject and click button</div>
            <a href="{{ url_for('teacher_dashboard') }}">Back</a>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
