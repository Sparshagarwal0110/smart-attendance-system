<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: linear-gradient(135deg, #4cc9f0 0%, #4361ee 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stat-card h3 {
            margin: 0;
            font-size: 14px;
            opacity: 0.9;
        }
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">👩‍🏫</div>
            <div class="logo-text">Teacher Dashboard</div>
        </div>
        <div class="content">
            <h1>Welcome, {{ username }}!</h1>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Present Today</h3>
                    <div class="number">{{ present_today }}</div>
                    <div class="label">Students marked present</div>
                </div>
                <div class="stat-card">
                    <h3>Attendance %</h3>
                    <div class="number">{{ attendance_percentage }}%</div>
                    <div class="label">Today's attendance rate</div>
                </div>
            </div>
            
            <div class="menu">
                <a href="{{ url_for('attendance_camera') }}">Start Face Recognition Attendance</a>
                <a href="{{ url_for('teacher_view_attendance') }}">View Attendance</a>
                <a href="{{ url_for('teacher_register_face') }}">Register Student Face</a>
                <a href="{{ url_for('teacher_stats') }}">Statistics & Charts</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            </div>
        </div>
    </div>
</body>
</html>
