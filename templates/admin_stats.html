<!DOCTYPE html>
<html>
<head>
    <title>Attendance Statistics - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📊</div>
            <div class="logo-text">Hospital Statistics</div>
        </div>
        <div class="content">
            <h2>Attendance Analytics</h2>
            <form id="filterForm">
                <label>Department:</label>
                <select id="deptSelect">
                    <option value="">-- All Departments --</option>
                    {% for d in departments %}
                    <option value="{{ d.id }}">{{ d.dept_code }} - {{ d.dept_name }}</option>
                    {% endfor %}
                </select>
                <button type="button" onclick="loadStats()">Load Statistics</button>
            </form>
            <div style="margin-bottom: 20px;">
                <canvas id="dailyChart" width="800" height="400"></canvas>
            </div>
            <div style="margin-bottom: 20px;">
                <canvas id="employeePieChart" width="800" height="400"></canvas>
            </div>
            <a href="{{ url_for('admin_dashboard') }}">Back</a>
        </div>
    </div>
    <script>
        let dailyChart, pieChart;
        function loadStats() {
            const deptId = document.getElementById('deptSelect').value;
            let url = '/admin/stats/data' + (deptId ? '?department_id='+deptId : '');
            fetch(url).then(res=>res.json()).then(data=>{
                if(dailyChart) dailyChart.destroy();
                dailyChart = new Chart(document.getElementById('dailyChart'), {
                    type: 'line',
                    data: { labels: data.daily.map(d=>d.date), datasets: [{ label: 'Daily Attendances', data: data.daily.map(d=>d.count), borderColor: 'blue' }] }
                });
                if(pieChart) pieChart.destroy();
                const empData = data.employee_percentages || [];
                if(empData.length) {
                    pieChart = new Chart(document.getElementById('employeePieChart'), {
                        type: 'pie',
                        data: { labels: empData.slice(0,10).map(e=>e.name), datasets: [{ data: empData.slice(0,10).map(e=>e.percentage), backgroundColor: ['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF'] }] }
                    });
                } else {
                    document.getElementById('employeePieChart').getContext('2d').clearRect(0,0,800,400);
                }
            });
        }
        loadStats();
    </script>
</body>
</html>
