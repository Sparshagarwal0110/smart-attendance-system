<!DOCTYPE html>
<html>
<head>
    <title>Attendance Statistics - Teacher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📈</div>
            <div class="logo-text">Class Statistics</div>
        </div>
        <div class="content">
            <h2>Class Attendance Trends</h2>
            <form id="filterForm">
                <label>Subject:</label>
                <select id="subjectSelect">
                    <option value="">-- Select Subject --</option>
                    {% for subj in subjects %}
                    <option value="{{ subj.id }}">{{ subj.subject_code }} - {{ subj.subject_name }}</option>
                    {% endfor %}
                </select>
                <button type="button" onclick="loadStats()">Load Statistics</button>
            </form>
            <canvas id="dailyChart" width="800" height="400"></canvas>
            <br><a href="{{ url_for('teacher_dashboard') }}">Back to Dashboard</a>
        </div>
    </div>
    <script>
        function loadStats() {
            const subjectId = document.getElementById('subjectSelect').value;
            if (!subjectId) {
                alert('Please select a subject');
                return;
            }
            fetch('/teacher/stats/data?subject_id=' + subjectId)
                .then(response => response.json())
                .then(data => {
                    const ctx = document.getElementById('dailyChart').getContext('2d');
                    if (window.teacherChart) window.teacherChart.destroy();
                    window.teacherChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.daily.map(d => d.date),
                            datasets: [{
                                label: 'Daily Attendance Count',
                                data: data.daily.map(d => d.count),
                                borderColor: 'green',
                                fill: false
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: { y: { beginAtZero: true, title: { display: true, text: 'Number of Students' } } }
                        }
                    });
                });
        }
    </script>
</body>
</html>
