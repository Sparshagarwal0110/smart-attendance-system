<!DOCTYPE html>
<html>
<head>
    <title>Register Employee Face</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📸</div>
            <div class="logo-text">Face Registration</div>
        </div>
        <div class="content">
            <h2>Register Face for Employee</h2>
            {% if request.args.get('success') %}
                <p class="success">Face registered successfully for {{ request.args.get('success') }}!</p>
            {% endif %}
            <form method="POST" action="{{ url_for('hod_submit_face') }}" enctype="multipart/form-data">
                <label>Select Employee:</label>
                <select name="employee_id" required>
                    <option value="">-- Select Employee --</option>
                    {% for e in employees %}
                    <option value="{{ e.employee_id }}">{{ e.name }} ({{ e.employee_id }}) {% if e.has_face %}[Face already set]{% endif %}</option>
                    {% endfor %}
                </select>
                <label>Upload Face Image (clear frontal face):</label>
                <input type="file" name="face_image" accept="image/*" required>
                <button type="submit">Register Face</button>
            </form>
            <a href="{{ url_for('hod_dashboard') }}">Back</a>
        </div>
    </div>
</body>
</html>
