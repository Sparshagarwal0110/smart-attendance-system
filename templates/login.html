<!DOCTYPE html>
<html>
<head>
    <title>Login - Smart Attendance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📸</text></svg>">
</head>
<body>
    <div class="login-container" style="max-width: 450px;">
        <div class="header" style="justify-content: center;">
            <div class="logo">📸</div>
            <div class="logo-text">Smart Attendance</div>
        </div>
        <div class="content">
            <h2 style="text-align: center;">Welcome Back</h2>
            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}
            <form method="POST">
                <input type="text" name="username" placeholder="Username" required style="width: 100%;">
                <input type="password" name="password" placeholder="Password" required style="width: 100%;">
                <button type="submit" style="width: 100%;">Login</button>
            </form>
            <p class="info">Admin: admin / admin123 | Create other users via admin panel</p>
        </div>
    </div>
</body>
</html>
