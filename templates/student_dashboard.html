<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎓</div>
            <div class="logo-text">Student Portal</div>
        </div>
        <div class="content">
            <h1>Welcome, {{ username }}!</h1>
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 300px;">
                    <canvas id="attendancePie" width="300" height="300"></canvas>
                </div>
                <div style="flex: 2; min-width: 400px;">
                    <canvas id="monthlyTrend" width="400" height="300"></canvas>
                </div>
            </div>
            <h3>Your Attendance Records</h3>
            <table id="attendanceTable">
                <thead>
                    <tr><th>Date</th><th>Time In</th><th>Status</th></tr>
                </thead>
                <tbody id="attendanceTableBody">
                    <tr><td colspan="3">Loading...</td></tr>
                </tbody>
            </table>
            <div class="menu" style="margin-top: 20px;">
                <a href="{{ url_for('student_export_csv') }}">Export to CSV</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            </div>
        </div>
    </div>
    <script>
        fetch('/student/attendance_data')
            .then(response => response.json())
            .then(records => {
                const tbody = document.getElementById('attendanceTableBody');
                tbody.innerHTML = '';
                if (records.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3">No records found</td></tr>';
                } else {
                    records.forEach(rec => {
                        const row = tbody.insertRow();
                        row.insertCell(0).textContent = rec.date;
                        row.insertCell(1).textContent = rec.time_in;
                        row.insertCell(2).textContent = rec.status;
                    });
                }

                const totalDays = records.length;
                const presentDays = records.filter(r => r.status === 'present').length;
                const pieCtx = document.getElementById('attendancePie').getContext('2d');
                new Chart(pieCtx, {
                    type: 'pie',
                    data: {
                        labels: ['Present', 'Absent (not marked)'],
                        datasets: [{
                            data: [presentDays, totalDays - presentDays],
                            backgroundColor: ['#06d6a0', '#ef476f']
                        }]
                    },
                    options: { responsive: true, plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw} days` } } } }
                });

                const monthMap = {};
                records.forEach(rec => {
                    const month = rec.date.substring(0,7);
                    if (!monthMap[month]) monthMap[month] = { present: 0, total: 0 };
                    monthMap[month].total++;
                    if (rec.status === 'present') monthMap[month].present++;
                });
                const months = Object.keys(monthMap).sort();
                const percentages = months.map(m => (monthMap[m].present / monthMap[m].total * 100).toFixed(1));
                const lineCtx = document.getElementById('monthlyTrend').getContext('2d');
                new Chart(lineCtx, {
                    type: 'line',
                    data: {
                        labels: months,
                        datasets: [{
                            label: 'Monthly Attendance %',
                            data: percentages,
                            borderColor: '#4361ee',
                            fill: false
                        }]
                    },
                    options: {
                        scales: { y: { beginAtZero: true, max: 100, title: { display: true, text: 'Percentage (%)' } } }
                    }
                });
            });
    </script>
</body>
</html>
