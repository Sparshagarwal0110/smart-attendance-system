<!DOCTYPE html>
<html>
<head>
    <title>HOD Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:20px; margin:30px 0; }
        .stat-card { background: linear-gradient(135deg,#4cc9f0 0%,#4361ee 100%); color:white; padding:20px; border-radius:12px; text-align:center; }
        .stat-card .number { font-size:36px; font-weight:bold; margin:10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><div class="logo">👩‍⚕️</div><div class="logo-text">HOD Dashboard</div></div>
        <div class="content">
            <h1>Welcome, Dr. {{ username }}!</h1>
            <div class="stats-grid">
                <div class="stat-card"><h3>Present Today (Your Depts)</h3><div class="number">{{ present_today }}</div></div>
                <div class="stat-card"><h3>Attendance %</h3><div class="number">{{ attendance_percent }}%</div></div>
            </div>
            <div class="menu">
                <a href="{{ url_for('hod_attendance_camera') }}">Mark Attendance (Face)</a>
                <a href="{{ url_for('hod_view_attendance') }}">View Attendance</a>
                <a href="{{ url_for('hod_register_face_live') }}">Register Face (Live Camera)</a>
                <a href="{{ url_for('hod_stats') }}">Statistics</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            </div>
        </div>
    </div>
</body>
</html>
